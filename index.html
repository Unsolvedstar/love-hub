<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Hub 💖</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial;
}

/* MAIN BACKGROUND */
body {
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* MAIN CONTENT (buttons) */
.container {
    width: 90%;
    max-width: 400px;
    text-align: center;
}

.btn {
    display: block;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    color: white;
    text-decoration: none;
    font-size: 18px;
}

/* 🔒 LOCKSCREEN OVERLAY */
#lockscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: linear-gradient(135deg,#ff9a9e,#fad0c4);

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

/* LOGIN BOX */
.login-box {
    background: rgba(0,0,0,0.3);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    backdrop-filter: blur(10px);
    animation: fadeIn 1s ease;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.login-box button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #ff6f91;
    color: white;
    cursor: pointer;
}

.error {
    margin-top: 10px;
    color: #ffdede;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- 🔒 LOCKSCREEN -->
<div id="lockscreen">
    <div class="login-box">
        <h2>💖 Welcome My Love 💖</h2>
        <p>Enter our secret password</p>

        <input type="password" id="passwordInput" placeholder="Enter password 💌">
        <button onclick="unlock()">Unlock 💕</button>

        <div class="error" id="errorMsg"></div>
    </div>
</div>

<!-- 💖 MAIN CONTENT -->
<div class="container">
    <h1>💖 Our Love Hub 💖</h1>
    <p>Choose a memory</p>

    <a class="btn" href="monthly.html">💕 Monthly Countdown</a>
    <a class="btn" href="yearly.html">💍 Yearly Anniversary</a>
    <a class="btn" href="met.html">💌 Since We Met</a>
</div>

<script>

const password = "Pebbles"; // change this

// Check if already unlocked
window.onload = function () {
    if (localStorage.getItem("unlocked") === "true") {
        document.getElementById("lockscreen").style.display = "none";
    }
};

function unlock() {
    const input = document.getElementById("passwordInput").value;
    const error = document.getElementById("errorMsg");

    if (input === password) {
        localStorage.setItem("unlocked", "true"); // SAVE STATE
        document.getElementById("lockscreen").style.display = "none";
    } else {
        error.textContent = "Wrong password 💔";
        error.style.animation = "shake 0.5s";
        error.addEventListener("animationend", () => {
            error.style.animation = "";
        });
    }
}

// Enter key support
document.getElementById("passwordInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") unlock();
});

</script>

</body>
</html>
